<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stickman Sprite Maker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app" id="app">

  <div class="tabbar">
    <span class="brand">Stickman Sprite Maker</span>
    <div class="tab active" data-tab="pose">Pose</div>
    <div class="tab" data-tab="library">Library</div>
    <div class="tab" data-tab="export">Export</div>
    <div class="spacer"></div>
    <span class="sprite-name-badge" id="spriteNameBadge">No sprite loaded</span>
  </div>

  <div class="body">
    <div class="sidebar" id="sidebar"><!-- populated per-mode by JS --></div>
    <div class="stage-wrap">
      <div class="stage-area">
        <canvas id="stageCanvas" width="480" height="480"></canvas>
      </div>
      <div class="timeline-wrap" id="timelineWrap">
        <div class="timeline-strip" id="timelineStrip"></div>
      </div>
    </div>
  </div>

  <div class="statusbar" id="statusbar">Drag any joint to pose the stickman. Build a few frames, then export a sprite sheet.</div>
</div>

<!--
  Scripts must load in this exact order — each one depends on globals
  defined by the files before it:
    1. storage.js          - localStorage shim + save/load functions
    2. skeleton.js         - the fixed joint/bone graph (SKELETON, ALL_JOINTS)
    3. fk.js               - forward-kinematics solver + bone transforms
    4. default-stickman.js - the built-in stickman's rigid pieces + bind pose
    5. app.js              - APP state, canvas refs, setMode/tab wiring
    6. input.js            - pointer-event coordinate conversion + wiring
    7. pose.js             - keyframes, joint-drag-to-angle math
    8. render.js           - draws rigid pieces via FK (no shared mesh,
                              so body parts can never warp into each other)
    9. export.js           - sprite sheet PNG + animated GIF preview
   10. ui.js               - sidebar/timeline HTML + all their event wiring
   11. bootstrap.js        - MUST be last: loads the stickman, first render
-->
<script src="src/storage.js"></script>
<script src="src/skeleton.js"></script>
<script src="src/fk.js"></script>
<script src="src/default-stickman.js"></script>
<script src="src/app.js"></script>
<script src="src/input.js"></script>
<script src="src/pose.js"></script>
<script src="src/render.js"></script>
<script src="src/export.js"></script>
<script src="src/ui.js"></script>
<script src="src/bootstrap.js"></script>
</body>
</html>
