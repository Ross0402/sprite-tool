<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stickman Sprite Maker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Stickman Sprite Maker</h1>
      <p id="status">Select [Torso], then click the canvas to begin.</p>
    </header>

    <div class="stage-frame">
      <canvas id="stage" width="300" height="300"></canvas>
    </div>

    <div class="panel">
      <div class="row">
        <span class="row-label">Build</span>
        <button data-part="torso">Torso</button>
        <button data-part="head">Head</button>
        <button data-part="arm">Arm</button>
        <button data-part="leg">Leg</button>
      </div>

      <hr class="divider" />

      <div class="row">
        <span class="row-label">Animate</span>
        <button data-move="walk">Walk</button>
        <button data-move="run">Run</button>
        <button data-move="jump">Jump</button>
      </div>

      <hr class="divider" />

      <div class="row" style="justify-content: space-between;">
        <span class="mode-badge">Mode: <span id="modeLabel">BUILD_MODE</span></span>
        <div class="row" style="width: auto;">
          <button id="resetBtn" class="ghost">Reset</button>
          <button id="downloadBtn" class="primary">Download Sprite Sheet</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts must load in this exact order so they can talk to each other -->
  <script src="src/config.js"></script>
  <script src="src/engine.js"></script>
  <script src="src/exporter.js"></script>
  <script src="src/input.js"></script>
</body>
</html>
